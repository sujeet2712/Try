<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gold Live Chart – TradingView</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 95%;
            max-width: 1200px;
            margin: 30px auto;
            text-align: center;
        }
        .price-box {
            font-size: 24px;
            margin-bottom: 20px;
            padding: 15px 25px;
            background: #222;
            border-radius: 8px;
            display: inline-block;
            border: 1px solid #444;
        }
        h1 {
            font-weight: 500;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Gold Live Chart</h1>

    <!-- OPTIONAL: Live price from GoldAPI -->
    <div id="live-price" class="price-box">
        Loading live gold price...
    </div>

    <!-- TradingView Widget -->
    <div class="tradingview-widget-container">
        <div id="tradingview_gold"></div>
        <script src="https://s3.tradingview.com/tv.js"></script>
        <script>
            new TradingView.widget({
                "width": "100%",
                "height": 600,
                "symbol": "OANDA:XAUUSD",
                "interval": "60",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#111",
                "enable_publishing": false,
                "allow_symbol_change": false,
                "container_id": "tradingview_gold"
            });
        </script>
    </div>
</div>

<script>
// OPTIONAL: Live price using your GoldAPI key
const API_KEY = "goldapi-3oxc5gsmnfuunj4-io";
const BASE_URL = "https://www.goldapi.io/api";

async function fetchLivePrice() {
    const box = document.getElementById("live-price");

    try {
        const res = await fetch(`${BASE_URL}/XAU/USD`, {
            headers: { "x-access-token": API_KEY }
        });

        const data = await res.json();
        box.innerText = `Live Gold Price: $${data.price.toFixed(2)} / oz`;
    } catch (err) {
        box.innerText = "Error loading price";
        console.error(err);
    }
}

fetchLivePrice();
setInterval(fetchLivePrice, 3600000); // refresh every hour
</script>

</body>
</html>
