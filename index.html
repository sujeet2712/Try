<div id="stockBox" style="
  padding:20px;
  background:rgba(255,255,255,0.1);
  border-radius:12px;
  width:250px;
  font-family:Inter, sans-serif;
  color:#e2e8f0;
">
  <h3>Live Stock Price</h3>
  <p id="stockName">AAPL</p>
  <p id="stockPrice">Loading...</p>
</div>

<script>
  const API_KEY = "YOUR_API_KEY"; // Alpha Vantage key
  const symbol = "AAPL";

  async function loadPrice() {
    const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();

    const price = data["Global Quote"]["05. price"];
    document.getElementById("stockPrice").textContent = "$" + Number(price).toFixed(2);
  }

  loadPrice();
  setInterval(loadPrice, 60000); // refresh every 60 seconds
</script>
