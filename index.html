<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sensor Management Dashboard</title>
<style>
    body { font-family: Arial; margin: 20px; }
    h2 { margin-bottom: 10px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background: #f0f0f0; }
    .overdue { background: #ffb3b3; }
    .due-soon { background: #fff3b3; }
    #notificationBox {
        padding: 10px; background: #e8f4ff; border: 1px solid #90c8ff;
        margin-bottom: 15px; display: none;
    }
</style>
</head>
<body>

<h2>Sensor Management</h2>

<div id="notificationBox"></div>

<label>Sensor No:</label>
<input type="text" id="sensorNo">

<label>Out Date:</label>
<input type="date" id="outDate">

<label>Due Date (optional):</label>
<input type="date" id="dueDate">

<button onclick="addSensor()">Add Sensor</button>

<table id="sensorTable">
    <thead>
        <tr>
            <th>Sensor No.</th>
            <th>Out Date</th>
            <th>Due Date</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
let sensors = JSON.parse(localStorage.getItem("sensors") || "[]");

function save() {
    localStorage.setItem("sensors", JSON.stringify(sensors));
}

function addSensor() {
    const sensorNo = document.getElementById("sensorNo").value;
    const outDate = document.getElementById("outDate").value;
    const dueDate = document.getElementById("dueDate").value;

    if (!sensorNo || !outDate) return alert("Sensor No. and Out Date required");

    sensors.push({ sensorNo, outDate, dueDate });
    save();
    render();
}

function render() {
    const tbody = document.querySelector("#sensorTable tbody");
    tbody.innerHTML = "";
    const now = new Date();
    let notifications = [];

    sensors.forEach(s => {
        const tr = document.createElement("tr");

        // Due date logic
        if (s.dueDate) {
            const due = new Date(s.dueDate);
            const diff = (due - now) / (1000 * 60 * 60 * 24);

            if (diff < 0) {
                tr.classList.add("overdue");
                notifications.push(`Sensor ${s.sensorNo} is OVERDUE`);
            } else if (diff <= 1) {
                tr.classList.add("due-soon");
                notifications.push(`Sensor ${s.sensorNo} is due soon`);
            }
        }

        tr.innerHTML = `
            <td>${s.sensorNo}</td>
            <td>${s.outDate}</td>
            <td>${s.dueDate || "-"}</td>
        `;
        tbody.appendChild(tr);
    });

    const box = document.getElementById("notificationBox");
    if (notifications.length > 0) {
        box.style.display = "block";
        box.innerHTML = notifications.join("<br>");
    } else {
        box.style.display = "none";
    }
}

render();
setInterval(render, 60000); // check every minute
</script>

</body>
</html>
