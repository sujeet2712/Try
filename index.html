<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Live Gold Price (XAU/USD)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
    }
    .price {
      font-size: 40px;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Live Gold Price (XAU/USD)</h1>
  <div class="price" id="goldPrice">Loading...</div>

  <script>
    async function loadGold() {
      try {
        const res = await fetch("https://api.exchangerate.host/latest?base=XAU&symbols=USD");
        const data = await res.json();

        const goldPrice = data.rates.USD; // USD per 1 ounce of gold

        document.getElementById("goldPrice").textContent = "$" + goldPrice.toFixed(2);
      } catch (err) {
        document.getElementById("goldPrice").textContent = "Error loading price";
      }
    }

    loadGold();
  </script>

</body>
</html>
