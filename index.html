<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gold 1H Auto Trend Analyzer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 95%;
            max-width: 1400px;
            margin: 30px auto;
        }
        h1 {
            text-align: center;
            font-weight: 500;
        }
        .layout {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .chart-col {
            flex: 3;
        }
        .analysis-col {
            flex: 1;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        .analysis-box {
            margin-bottom: 20px;
            padding: 15px;
            background: #222;
            border-radius: 8px;
            border: 1px solid #444;
            font-size: 14px;
            line-height: 1.5;
        }
        .uptrend { color: #26a69a; font-weight: bold; }
        .downtrend { color: #ef5350; font-weight: bold; }
        .sideways { color: #ffeb3b; font-weight: bold; }
        .label { color: #aaa; }
        .value { color: #fff; }
    </style>
</head>

<body>

<div class="container">
    <h1>Gold 1H Auto Trend Analyzer</h1>

    <div class="layout">
        <!-- TradingView Chart -->
        <div class="chart-col">
            <div class="tradingview-widget-container">
                <div id="tradingview_gold"></div>
                <script src="https://s3.tradingview.com/tv.js"></script>
                <script>
                    new TradingView.widget({
                        "width": "100%",
                        "height": 700,
                        "symbol": "OANDA:XAUUSD",
                        "interval": "60",
                        "timezone": "Etc/UTC",
                        "theme": "dark",
                        "style": "1",
                        "locale": "en",
                        "toolbar_bg": "#111",
                        "enable_publishing": false,
                        "allow_symbol_change": false,
                        "container_id": "tradingview_gold"
                    });
                </script>
            </div>
        </div>

        <!-- Analyzer Panel -->
        <div class="analysis-col">
            <h2>1H Auto Trend Analyzer</h2>
            <div id="trend-1h" class="analysis-box">
                Loading 1H analysis...
            </div>
        </div>
    </div>
</div>

<script>
// ===============================
// CONFIG
// ===============================
const API_KEY = "goldapi-3oxc5gsmnfuunj4-io"; 
const BASE_URL = "https://www.goldapi.io/api";

// ===============================
// FETCH 1H CANDLES FROM GOLDAPI
// ===============================
async function fetchCandles() {
    try {
        const url = `${BASE_URL}/XAU/USD/history?period=hour&limit=200`;
        const res = await fetch(url, {
            headers: { "x-access-token": API_KEY }
        });

        const data = await res.json();
        if (!Array.isArray(data)) return [];

        return data.map(c => ({
            time: c.date,
            open: c.open,
            high: c.high,
            low: c.low,
            close: c.close,
            volume: c.volume || 0
        }));
    } catch (err) {
        console.error("GoldAPI error:", err);
        return [];
    }
}

// ===============================
// EMA CALCULATION
// ===============================
function ema(values, period) {
    const k = 2 / (period + 1);
    let emaArr = [values[0]];
    for (let i = 1; i < values.length; i++) {
        emaArr.push(values[i] * k + emaArr[i - 1] * (1 - k));
    }
    return emaArr;
}

// ===============================
// ANALYZER LOGIC
// ===============================
function analyze(candles) {
    const closes = candles.map(c => c.close);
    const volumes = candles.map(c => c.volume);

    // EMA
    const ema9 = ema(closes, 9);
    const ema13 = ema(closes, 13);
    const emaCross = ema9.at(-1) > ema13.at(-1) ? "Bullish" : "Bearish";

    // Volume
    const avgVol = volumes.slice(-20).reduce((a,b)=>a+b,0) / 20;
    const volStrength = volumes.at(-1) > avgVol ? "Strong" : "Weak";

    // Support / Fib
    const recent = candles.slice(-50);
    const high = Math.max(...recent.map(c => c.high));
    const low = Math.min(...recent.map(c => c.low));
    const lastClose = closes.at(-1);

    const fib382 = low + (high - low) * 0.382;
    const fib500 = low + (high - low) * 0.5;
    const fib618 = low + (high - low) * 0.618;

    let fibCheck = "Below 0.382";
    if (lastClose > fib382) fibCheck = "Above 0.382";
    if (lastClose > fib500) fibCheck = "Above 0.5";
    if (lastClose > fib618) fibCheck = "Above 0.618";

    // Final Signal
    let signal = "NEUTRAL";
    if (emaCross === "Bullish" && volStrength === "Strong" && lastClose > fib500) signal = "BUY";
    if (emaCross === "Bearish" && volStrength === "Strong" && lastClose < fib500) signal = "SELL";

    return { emaCross, volStrength, fibCheck, lastClose, high, low, fib382, fib500, fib618, signal };
}

// ===============================
// UPDATE PANEL
// ===============================
async function updatePanel() {
    const box = document.getElementById("trend-1h");
    box.innerHTML = "Loading...";

    const candles = await fetchCandles();
    if (!candles.length) {
        box.innerHTML = "Error: No GoldAPI data.";
        return;
    }

    const r = analyze(candles);

    const signalClass =
        r.signal === "BUY" ? "uptrend" :
        r.signal === "SELL" ? "downtrend" : "sideways";

    box.innerHTML = `
        <div><span class="label">EMA Crossover:</span> <span class="value">${r.emaCross}</span></div>
        <div><span class="label">Volume Strength:</span> <span class="value">${r.volStrength}</span></div>
        <div><span class="label">Fibonacci:</span> <span class="value">${r.fibCheck}</span></div>
        <div><span class="label">Last Close:</span> <span class="value">${r.lastClose.toFixed(2)}</span></div>
        <hr>
        <div><span class="label">Final Signal:</span> <span class="${signalClass}">${r.signal}</span></div>
    `;
}

updatePanel();
setInterval(updatePanel, 300000); // refresh every 5 minutes
</script>

</body>
</html>
