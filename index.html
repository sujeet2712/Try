<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gold Candlestick Analyzer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 95%;
            max-width: 1000px;
            margin: 30px auto;
            text-align: center;
        }
        .price-box {
            font-size: 24px;
            margin-bottom: 20px;
            padding: 15px 25px;
            background: #222;
            border-radius: 8px;
            display: inline-block;
            border: 1px solid #444;
        }
        #chart {
            height: 500px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Gold Candlestick Analyzer</h1>

    <div id="live-price" class="price-box">
        Loading live gold price...
    </div>

    <div id="chart"></div>
</div>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<script>
// ===============================
// CONFIG
// ===============================
const API_KEY = "goldapi-3oxc5gsmnfuunj4-io";  // <-- your key
const BASE_URL = "https://www.goldapi.io/api";

// ===============================
// FETCH LIVE PRICE
// ===============================
async function fetchLivePrice() {
    const box = document.getElementById("live-price");

    try {
        const res = await fetch(`${BASE_URL}/XAU/USD`, {
            headers: { "x-access-token": API_KEY }
        });

        const data = await res.json();
        box.innerText = `Live Gold Price: $${data.price.toFixed(2)} / oz`;

        return data.price;
    } catch (err) {
        box.innerText = "Error loading price";
        console.error(err);
    }
}

// ===============================
// FETCH HISTORICAL OHLC DATA
// ===============================
async function fetchCandles() {
    try {
        const res = await fetch(`${BASE_URL}/XAU/USD/history?period=day&limit=60`, {
            headers: { "x-access-token": API_KEY }
        });

        const data = await res.json();

        // Convert to Lightweight Charts format
        return data.map(c => ({
            time: c.date.substring(0, 10), // YYYY-MM-DD
            open: c.open,
            high: c.high,
            low: c.low,
            close: c.close
        }));
    } catch (err) {
        console.error("Error fetching candles:", err);
        return [];
    }
}

// ===============================
// DRAW CANDLESTICK CHART
// ===============================
let chart, candleSeries;

async function drawCandlestickChart() {
    const candles = await fetchCandles();

    if (!chart) {
        chart = LightweightCharts.createChart(document.getElementById("chart"), {
            width: document.getElementById("chart").clientWidth,
            height: 500,
            layout: {
                background: { color: "#111" },
                textColor: "#eee"
            },
            grid: {
                vertLines: { color: "#333" },
                horzLines: { color: "#333" }
            },
            timeScale: {
                borderColor: "#444"
            },
            rightPriceScale: {
                borderColor: "#444"
            }
        });

        candleSeries = chart.addCandlestickSeries({
            upColor: "#26a69a",
            downColor: "#ef5350",
            borderUpColor: "#26a69a",
            borderDownColor: "#ef5350",
            wickUpColor: "#26a69a",
            wickDownColor: "#ef5350"
        });
    }

    candleSeries.setData(candles);
}

// ===============================
// AUTO REFRESH EVERY HOUR
// ===============================
async function init() {
    await fetchLivePrice();
    await drawCandlestickChart();

    setInterval(async () => {
        await fetchLivePrice();
        await drawCandlestickChart();
    }, 3600000);
}

init();
</script>

</body>
</html>
