<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gold Price Analyzer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
            text-align: center;
        }
        .price-box {
            font-size: 24px;
            margin-bottom: 20px;
            padding: 15px 25px;
            background: #222;
            border-radius: 8px;
            display: inline-block;
            border: 1px solid #444;
        }
        canvas {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Gold Price Analyzer</h1>

    <div id="live-price" class="price-box">
        Loading live gold price...
    </div>

    <canvas id="goldChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// ===============================
// CONFIG
// ===============================
const API_KEY = "goldapi-3oxc5gsmnfuunj4-io";  // <-- your key
const BASE_URL = "https://www.goldapi.io/api";

// ===============================
// FETCH LIVE PRICE
// ===============================
async function fetchLivePrice() {
    const priceBox = document.getElementById("live-price");

    try {
        const res = await fetch(`${BASE_URL}/XAU/USD`, {
            headers: { "x-access-token": API_KEY }
        });

        const data = await res.json();
        priceBox.innerText = `Live Gold Price: $${data.price.toFixed(2)} / oz`;

        return data.price;
    } catch (err) {
        priceBox.innerText = "Error loading price";
        console.error(err);
    }
}

// ===============================
// FETCH LAST 24 HOURS (HOURLY)
// ===============================
async function fetchHourlyData() {
    try {
        const res = await fetch(`${BASE_URL}/XAU/USD/history?period=hour&limit=24`, {
            headers: { "x-access-token": API_KEY }
        });

        const data = await res.json();

        // Extract closing prices
        const labels = data.map(item => item.date.substring(11, 16)); // HH:MM
        const prices = data.map(item => item.close);

        return { labels, prices };
    } catch (err) {
        console.error("Error fetching hourly data:", err);
        return { labels: [], prices: [] };
    }
}

// ===============================
// DRAW BAR CHART
// ===============================
let chart;

async function drawBarChart() {
    const { labels, prices } = await fetchHourlyData();

    const ctx = document.getElementById("goldChart").getContext("2d");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Gold Closing Price (Last 24 Hours)",
                data: prices,
                backgroundColor: "gold",
                borderColor: "#ffdd55",
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { labels: { color: "#eee" } }
            },
            scales: {
                x: {
                    ticks: { color: "#aaa" },
                    grid: { color: "#333" }
                },
                y: {
                    ticks: { color: "#aaa" },
                    grid: { color: "#333" }
                }
            }
        }
    });
}

// ===============================
// AUTO REFRESH EVERY HOUR
// ===============================
async function init() {
    await fetchLivePrice();
    await drawBarChart();

    // Refresh every hour (3600000 ms)
    setInterval(async () => {
        await fetchLivePrice();
        await drawBarChart();
    }, 3600000);
}

init();
</script>

</body>
</html>
