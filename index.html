<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Finance Tracker</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Inter, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .card {
      width: 100%;
      max-width: 900px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 32px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    h1 {
      text-align: center;
      margin-top: 0;
      font-weight: 600;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input, select {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: #e2e8f0;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      text-align: left;
    }

    .summary {
      margin-top: 20px;
      font-size: 18px;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>💰 My Finance Tracker</h1>

    <div class="row">
      <input id="desc" placeholder="Description (e.g., Paid rent, Received payment)" />
      <input id="amount" type="number" placeholder="Amount" />
      <select id="type">
        <option value="in">Money In</option>
        <option value="out">Money Out</option>
      </select>
      <button onclick="addEntry()">Add</button>
    </div>

    <div class="summary">
      Total In: <span id="totalIn">0</span> |
      Total Out: <span id="totalOut">0</span> |
      Balance: <span id="balance">0</span>
    </div>

    <table>
      <thead>
        <tr>
          <th>Description</th>
          <th>Amount</th>
          <th>Type</th>
          <th>Remove</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
    let data = JSON.parse(localStorage.getItem("financeData") || "[]");

    function save() {
      localStorage.setItem("financeData", JSON.stringify(data));
    }

    function addEntry() {
      const desc = document.getElementById("desc").value;
      const amount = Number(document.getElementById("amount").value);
      const type = document.getElementById("type").value;

      if (!desc || !amount) return;

      data.push({ desc, amount, type });
      save();
      render();
    }

    function removeEntry(index) {
      data.splice(index, 1);
      save();
      render();
    }

    function render() {
      const body = document.getElementById("tableBody");
      body.innerHTML = "";

      let totalIn = 0;
      let totalOut = 0;

      data.forEach((item, i) => {
        if (item.type === "in") totalIn += item.amount;
        else totalOut += item.amount;

        body.innerHTML += `
          <tr>
            <td>${item.desc}</td>
            <td>${item.amount}</td>
            <td>${item.type === "in" ? "In" : "Out"}</td>
            <td><button onclick="removeEntry(${i})">X</button></td>
          </tr>
        `;
      });

      document.getElementById("totalIn").textContent = totalIn;
      document.getElementById("totalOut").textContent = totalOut;
      document.getElementById("balance").textContent = totalIn - totalOut;
    }

    render();
  </script>
</body>
</html>
