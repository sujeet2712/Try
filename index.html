<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gold 1H Auto Trend Analyzer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 95%;
            max-width: 1400px;
            margin: 30px auto;
        }
        h1 {
            text-align: center;
            font-weight: 500;
        }
        .layout {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .chart-col {
            flex: 3;
        }
        .analysis-col {
            flex: 1;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        .analysis-box {
            margin-bottom: 20px;
            padding: 15px;
            background: #222;
            border-radius: 8px;
            border: 1px solid #444;
            font-size: 14px;
            line-height: 1.5;
        }
        .uptrend { color: #26a69a; font-weight: bold; }
        .downtrend { color: #ef5350; font-weight: bold; }
        .sideways { color: #ffeb3b; font-weight: bold; }
        .label { color: #aaa; }
        .value { color: #fff; }
    </style>
</head>

<body>

<div class="container">
    <h1>Gold 1H Auto Trend Analyzer</h1>

    <div class="layout">
        <!-- TradingView Chart -->
        <div class="chart-col">
            <div class="tradingview-widget-container">
                <div id="tradingview_gold"></div>
                <script src="https://s3.tradingview.com/tv.js"></script>
                <script>
                    new TradingView.widget({
                        "width": "100%",
                        "height": 700,
                        "symbol": "OANDA:XAUUSD",
                        "interval": "60",
                        "timezone": "Etc/UTC",
                        "theme": "dark",
                        "style": "1",
                        "locale": "en",
                        "toolbar_bg": "#111",
                        "enable_publishing": false,
                        "allow_symbol_change": false,
                        "container_id": "tradingview_gold"
                    });
                </script>
            </div>
        </div>

        <!-- Analyzer Panel -->
        <div class="analysis-col">
            <h2>1H Auto Trend Analyzer</h2>
            <div id="trend-1h" class="analysis-box">
                Loading 1H analysis...
            </div>
        </div>
    </div>
</div>

<script>
// ===============================
// CONFIG
// ===============================
const API_KEY = "goldapi-3oxc5gsmnfuunj4-io"; // your key
const BASE_URL = "https://www.goldapi.io/api";

// ===============================
// FETCH 1H OHLC DATA
// ===============================
async function fetchOHLC(period = "hour", limit = 200) {
    try {
        const res = await fetch(`${BASE_URL}/XAU/USD/history?period=${period}&limit=${limit}`, {
            headers: { "x-access-token": API_KEY }
        });
        const data = await res.json();
        if (!Array.isArray(data)) {
            console.error("Unexpected OHLC response:", data);
            return [];
        }
        return data;
    } catch (err) {
        console.error("Error fetching OHLC:", err);
        return [];
    }
}

// ===============================
// EMA CALCULATION
// ===============================
function ema(values, period) {
    if (values.length === 0) return [];
    const k = 2 / (period + 1);
    const emaArray = [values[0]];
    for (let i = 1; i < values.length; i++) {
        emaArray.push(values[i] * k + emaArray[i - 1] * (1 - k));
    }
    return emaArray;
}

// ===============================
// MAIN ANALYZER LOGIC
// ===============================
function analyze1H(candles) {
    if (candles.length < 50) {
        return { error: "Not enough data" };
    }

    const closes = candles.map(c => c.close);
    const volumes = candles.map(c => c.volume || 0);

    // EMA 9 & 13
    const ema9 = ema(closes, 9);
    const ema13 = ema(closes, 13);
    const lastEma9 = ema9[ema9.length - 1];
    const lastEma13 = ema13[ema13.length - 1];
    const emaCrossover = lastEma9 > lastEma13 ? "Bullish" : "Bearish";

    // Volume strength (last 20 candles)
    const volSlice = volumes.slice(-20);
    const avgVol = volSlice.reduce((a, b) => a + b, 0) / (volSlice.length || 1);
    const lastVol = volumes[volumes.length - 1];
    const volumeStrength = lastVol > avgVol ? "Strong" : "Weak";

    // Recent swing high/low (last 50 candles)
    const recent = candles.slice(-50);
    const high = Math.max(...recent.map(c => c.high));
    const low = Math.min(...recent.map(c => c.low));

    // Fibonacci levels
    const range = high - low;
    const fib382 = low + range * 0.382;
    const fib500 = low + range * 0.5;
    const fib618 = low + range * 0.618;

    const lastClose = closes[closes.length - 1];

    let fibCheck = "Below 0.382";
    if (lastClose > fib382) fibCheck = "Above 0.382";
    if (lastClose > fib500) fibCheck = "Above 0.5";
    if (lastClose > fib618) fibCheck = "Above 0.618";

    // Final signal
    let signal = "NEUTRAL";
    if (emaCrossover === "Bullish" && volumeStrength === "Strong" && lastClose > fib500) {
        signal = "BUY";
    } else if (emaCrossover === "Bearish" && volumeStrength === "Strong" && lastClose < fib500) {
        signal = "SELL";
    }

    return {
        emaCrossover,
        volumeStrength,
        fibCheck,
        lastClose,
        high,
        low,
        fib382,
        fib500,
        fib618,
        signal
    };
}

// ===============================
// UPDATE ANALYZER PANEL
// ===============================
async function updateAnalyzer1H() {
    const box = document.getElementById("trend-1h");
    box.innerHTML = "Loading 1H analysis...";

    const candles = await fetchOHLC("hour", 200);
    if (!candles.length) {
        box.innerHTML = "Error: No data received.";
        return;
    }

    const result = analyze1H(candles);
    if (result.error) {
        box.innerHTML = result.error;
        return;
    }

    const signalClass =
        result.signal === "BUY" ? "uptrend" :
        result.signal === "SELL" ? "downtrend" : "sideways";

    box.innerHTML = `
        <div><span class="label">EMA Crossover:</span> <span class="value">${result.emaCrossover}</span></div>
        <div><span class="label">Volume Strength:</span> <span class="value">${result.volumeStrength}</span></div>
        <div><span class="label">Fibonacci Zone:</span> <span class="value">${result.fibCheck}</span></div>
        <div><span class="label">Last Close:</span> <span class="value">${result.lastClose.toFixed(2)}</span></div>
        <div><span class="label">Range Low:</span> <span class="value">${result.low.toFixed(2)}</span></div>
        <div><span class="label">Range High:</span> <span class="value">${result.high.toFixed(2)}</span></div>
        <div><span class="label">Fib 0.382:</span> <span class="value">${result.fib382.toFixed(2)}</span></div>
        <div><span class="label">Fib 0.5:</span> <span class="value">${result.fib500.toFixed(2)}</span></div>
        <div><span class="label">Fib 0.618:</span> <span class="value">${result.fib618.toFixed(2)}</span></div>
        <hr>
        <div><span class="label">Final Signal:</span> <span class="${signalClass}">${result.signal}</span></div>
    `;
}

// run now + every hour
updateAnalyzer1H();
setInterval(updateAnalyzer1H, 3600000);
</script>

</body>
</html>
