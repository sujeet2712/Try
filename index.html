<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gold Price Analyzer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: #eee;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
            text-align: center;
        }
        h1 {
            margin-bottom: 20px;
            font-weight: 500;
        }
        .price-box {
            font-size: 24px;
            margin-bottom: 20px;
            padding: 15px 25px;
            background: #222;
            border-radius: 8px;
            display: inline-block;
            border: 1px solid #444;
        }
        canvas {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Gold Price Analyzer</h1>

    <div id="live-price" class="price-box">
        Loading live gold price...
    </div>

    <canvas id="goldChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// ===============================
// 1. CONFIG
// ===============================
const API_KEY = "YOUR_API_KEY_HERE";  // <-- paste your key here
const API_URL = `https://metals-api.com/api/latest?access_key=${API_KEY}&symbols=XAU&base=USD`;

// ===============================
// 2. FETCH LIVE GOLD PRICE
// ===============================
async function fetchGoldPrice() {
    const priceBox = document.getElementById("live-price");

    try {
        const response = await fetch(API_URL);
        const data = await response.json();

        if (!data || !data.rates || !data.rates.XAU) {
            priceBox.innerText = "Could not read gold price from API";
            console.error("Unexpected API response:", data);
            return null;
        }

        const price = data.rates.XAU;
        priceBox.innerText = `Gold Price: $${price.toFixed(2)} per ounce`;

        return price;
    } catch (err) {
        priceBox.innerText = "Error loading price";
        console.error("Error fetching gold price:", err);
        return null;
    }
}

// ===============================
// 3. SIMPLE PLACEHOLDER CHART
// ===============================
function drawPlaceholderChart() {
    const ctx = document.getElementById("goldChart").getContext("2d");

    new Chart(ctx, {
        type: "line",
        data: {
            labels: ["1", "2", "3", "4", "5"],
            datasets: [{
                label: "Gold Price (placeholder)",
                data: [1, 2, 3, 2, 4],
                borderColor: "gold",
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.2
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    labels: { color: "#eee" }
                }
            },
            scales: {
                x: {
                    ticks: { color: "#aaa" },
                    grid: { color: "#333" }
                },
                y: {
                    ticks: { color: "#aaa" },
                    grid: { color: "#333" }
                }
            }
        }
    });
}

// ===============================
// 4. INIT
// ===============================
(async function init() {
    await fetchGoldPrice();
    drawPlaceholderChart(); // will be replaced with real chart later
})();
</script>

</body>
</html>
