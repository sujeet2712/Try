<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gold Price (Simple Page)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
    }
    .price {
      font-size: 40px;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Live Gold Price (XAU/USD)</h1>
  <div class="price" id="goldPrice">Loading...</div>

  <script>
    async function loadGold() {
      try {
        const res = await fetch("https://api.metals.live/v1/spot");
        const data = await res.json();

        // Gold is usually the first item in the array
        const gold = data[0].price;

        document.getElementById("goldPrice").textContent = "$" + gold;
      } catch (err) {
        document.getElementById("goldPrice").textContent = "Error loading price";
      }
    }

    loadGold();
  </script>

</body>
</html>
